<!DOCTYPE html>
<html>
<head><meta charset='utf-8'><title>VK Screenshot Upload</title>
<style>body{background:#1a1a2e;color:#fff;font-family:monospace;padding:20px}button{background:#e94560;color:#fff;border:none;padding:10px 20px;cursor:pointer;margin:5px;font-size:16px}canvas{display:block;margin:10px 0;border:1px solid #333}#log{white-space:pre;margin-top:20px;background:#000;padding:10px;min-height:100px}</style></head>
<body>
<h2>VK Mini App Screenshot Uploader</h2>
<div id='screens'></div>
<div id='log'>Ready...</div>
<script>
const TOKEN='vk1.a.5vTVxKvMq_0geWImUSGljZ8rl5Ntu7xSoPu2JMpVT3mME9GU34dETmDhSec8aTNsYZpIgJ7P1qBp6fF306urQ1TkrrhuJK_WvxXt_Es7mMl9u-u0P_tCDt-BuwaMdxb2SKuSbuTwNHJzlu47_hOlxZD0njWpeGtCTe2cVeyLHVsiQm9mPlOoBFtY_dP0AbNLuLZaXFeetWiWU90MZGko1g';
const log=s=>{document.getElementById('log').textContent+=s+'\n';console.log(s);};

function mkCanvas(t,s,bg){const c=document.createElement('canvas');c.width=1200;c.height=600;const x=c.getContext('2d');x.fillStyle=bg;x.fillRect(0,0,1200,600);x.fillStyle='#e94560';x.fillRect(0,0,1200,8);x.fillStyle='#00d4ff';x.font='bold 52px Arial';x.textAlign='center';x.fillText(t,600,200);x.fillStyle='#aaaacc';x.font='32px Arial';x.fillText(s,600,280);x.fillStyle='#667799';x.font='24px Arial';x.fillText('VK Mini App | Эпилепсия: Реабилитация',600,560);return c;}

const screens=[
['obzor','Обзор заболевания','Классификация и типы эпилепсии','#1a1a2e'],
['therapy','Методы терапии','Современные подходы к лечению','#0d1b2a'],
['rehab','Реабилитация','Программы восстановления и поддержки','#162032']
];

const div=document.getElementById('screens');
screens.forEach(([id,t,s,bg])=>{
  const c=mkCanvas(t,s,bg);
  c.id=id;
  c.style.width='400px';
  c.style.height='200px';
  const btn=document.createElement('button');
  btn.textContent='Скопировать '+t;
  btn.onclick=async()=>{
    try{
      const blob=await new Promise(r=>c.toBlob(r,'image/png'));
      await navigator.clipboard.write([new ClipboardItem({'image/png':blob})]);
      log('Скопировано: '+t+' - теперь вставьте Ctrl+V в поле загрузки dev.vk.com');
    }catch(e){log('Ошибка clipboard: '+e);}
  };
  const a=document.createElement('a');
  a.textContent='Скачать '+t;
  a.href=c.toDataURL('image/png');
  a.download=id+'.png';
  a.style.cssText='background:#4caf50;color:#fff;padding:10px;margin:5px;display:inline-block;text-decoration:none';
  div.appendChild(c);
  div.appendChild(btn);
  div.appendChild(a);
  div.appendChild(document.createElement('hr'));
});

log('Страница загрузки готова. Нажмите "Скачать" для каждого скриншота.');
</script>
</body></html>
